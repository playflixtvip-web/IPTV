<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream VOD Elite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --n-red: #e50914;
            --n-black: #141414;
            --n-gray: #808080;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--n-black);
            color: white;
            margin: 0;
            user-select: none;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-0744f902144f/95958564-984e-4f76-857e-3c81e285d03c/BR-pt-20220502-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-card {
            background: rgba(0,0,0,0.75);
            padding: 60px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
        }

        /* Header */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,1), transparent);
            padding: 20px 4%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .nav-link {
            margin-left: 20px;
            cursor: pointer;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link.active { font-weight: bold; color: white; }

        /* Content */
        .main-container { padding: 80px 4% 20px; display: none; }

        .cat-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 20px 0;
            scrollbar-width: none;
        }

        .pill {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 12px;
        }

        .pill.active { background: white; color: black; font-weight: bold; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
        }

        .card {
            transition: transform 0.3s;
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
            aspect-ratio: 2/3;
            background: #222;
        }

        .card:hover { transform: scale(1.1); z-index: 10; }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Modal Episódios */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9000;
            padding: 50px 10%;
            overflow-y: auto;
        }

        .ep-item {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        /* Player */
        #player-box {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 10001;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--n-red)">NETFLIX</h1>
            <p style="color:gray">Usuário: 21467491</p>
            <button onclick="carregar()" id="btn" style="width:100%; padding:15px; background:var(--n-red); color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer">ENTRAR</button>
        </div>
    </div>

    <header id="header" style="display:none">
        <h2 style="color:var(--n-red); margin:0">VOD</h2>
        <span class="nav-link active" id="tab-f" onclick="setModo('filmes')">Filmes</span>
        <span class="nav-link" id="tab-s" onclick="setModo('series')">Séries</span>
    </header>

    <div class="main-container" id="main">
        <div id="pills" class="cat-row"></div>
        <h2 id="cat-title"></h2>
        <div id="grid" class="grid"></div>
    </div>

    <div id="modal">
        <button onclick="fecharModal()" style="padding:10px; background:var(--n-red); color:white; border:none; margin-bottom:20px">VOLTAR</button>
        <h2 id="m-title"></h2>
        <div id="m-list"></div>
    </div>

    <div id="player-box">
        <button onclick="fecharPlayer()" style="position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,0,0,0.5); color:white; border:none; padding:10px 20px; cursor:pointer">← VOLTAR</button>
        <video id="video" style="width:100%; height:100vh" controls autoplay></video>
    </div>

    <script>
        // Solução para o erro da imagem: Usando proxy para evitar bloqueio CORS
        const PROXY = "https://api.allorigins.win/raw?url=";
        const URL_ORIGINAL = "http://bufalov6.shop/get.php?username=21467491&password=79853258&type=m3u_plus&output=mpegts";
        
        let db = { filmes: {}, series: {} };
        let modo = 'filmes';
        let shakaInstance = null;

        async function carregar() {
            const btn = document.getElementById('btn');
            btn.innerText = "Sincronizando...";
            
            try {
                // Aqui o segredo: enviamos a requisição através do Proxy
                const res = await fetch(PROXY + encodeURIComponent(URL_ORIGINAL));
                const data = await res.text();
                
                parse(data);
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('header').style.display = 'flex';
                document.getElementById('main').style.display = 'block';
                render();
            } catch (e) {
                alert("Erro de conexão. O servidor da lista pode estar instável ou bloqueando o acesso.");
                btn.innerText = "TENTAR NOVAMENTE";
            }
        }

        function parse(text) {
            const lines = text.split('\n');
            let current = null;

            lines.forEach(l => {
                if(l.startsWith('#EXTINF:')) {
                    const grupo = l.match(/group-title="([^"]*)"/)?.[1] || "Geral";
                    const logo = l.match(/tvg-logo="([^"]*)"/)?.[1] || "";
                    const nome = l.split(',')[1]?.trim() || "S/N";
                    current = { grupo, logo, nome };
                } else if(l.startsWith('http') && current) {
                    const g = current.grupo.toLowerCase();
                    if(g.includes('serie')) {
                        let base = current.nome.split(/S\d+|T\d+|EP/i)[0].trim();
                        if(!db.series[current.grupo]) db.series[current.grupo] = {};
                        if(!db.series[current.grupo][base]) db.series[current.grupo][base] = { n: base, l: current.logo, eps: [] };
                        db.series[current.grupo][base].eps.push({ n: current.nome, u: l.trim() });
                    } else {
                        if(!db.filmes[current.grupo]) db.filmes[current.grupo] = [];
                        db.filmes[current.grupo].push({ n: current.nome, l: current.logo, u: l.trim() });
                    }
                    current = null;
                }
            });
        }

        function render() {
            const pBox = document.getElementById('pills');
            pBox.innerHTML = "";
            const cats = Object.keys(db[modo]);

            cats.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = `pill ${i === 0 ? 'active' : ''}`;
                div.innerText = c;
                div.onclick = () => {
                    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    div.classList.add('active');
                    fillGrid(c);
                };
                pBox.appendChild(div);
            });
            if(cats.length > 0) fillGrid(cats[0]);
        }

        function fillGrid(cName) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            document.getElementById('cat-title').innerText = cName;
            const items = modo === 'filmes' ? db.filmes[cName] : Object.values(db.series[cName]);

            items.forEach(item => {
                const d = document.createElement('div');
                d.className = 'card';
                d.innerHTML = `<img src="${item.l}" onerror="this.src='https://via.placeholder.com/200x300?text=VOD'">`;
                d.onclick = () => modo === 'series' ? openS(item) : play(item.u);
                grid.appendChild(d);
            });
        }

        function setModo(m) {
            modo = m;
            document.getElementById('tab-f').classList.toggle('active', m === 'filmes');
            document.getElementById('tab-s').classList.toggle('active', m === 'series');
            render();
        }

        function openS(s) {
            document.getElementById('m-title').innerText = s.n;
            const list = document.getElementById('m-list');
            list.innerHTML = "";
            s.eps.forEach(e => {
                const row = document.createElement('div');
                row.className = 'ep-item';
                row.innerHTML = `<span>${e.n}</span> <b style="color:var(--n-red)">ASSISTIR</b>`;
                row.onclick = () => { fecharModal(); play(e.u); };
                list.appendChild(row);
            });
            document.getElementById('modal').style.display = 'block';
        }

        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function play(url) {
            document.getElementById('player-box').style.display = 'block';
            const v = document.getElementById('video');
            if (shakaInstance) await shakaInstance.destroy();
            shakaInstance = new shaka.Player(v);
            try {
                await shakaInstance.load(url);
            } catch (e) {
                v.src = url;
            }
        }

        function fecharPlayer() {
            const v = document.getElementById('video');
            v.pause();
            v.src = "";
            document.getElementById('player-box').style.display = 'none';
        }

        shaka.polyfill.installAll();
    </script>
</body>
</html>
