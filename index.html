<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayFlix VIP - Sistema Master</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .hidden { display: none !important; }
        .box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Grid Estilo Streaming */
        .category-title { margin-top: 30px; color: #fff; font-size: 1.2rem; border-left: 4px solid var(--red); padding-left: 10px; font-weight: bold; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 15px; }
        .movie-item { transition: 0.3s; cursor: pointer; background: #1a1a1a; border-radius: 5px; overflow: hidden; border: 1px solid transparent; }
        .movie-item:hover { transform: scale(1.05); border-color: var(--red); }
        .movie-item img { width: 100%; height: 190px; object-fit: cover; background: #000; }
        .movie-name { padding: 5px; font-size: 11px; text-align: center; height: 30px; overflow: hidden; }

        /* Tabela ADM */
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        
        #player-modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        video { width: 100%; height: 100%; }
        .close-p { position: absolute; top: 20px; right: 20px; background: var(--red); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; z-index: 10001; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="scr-login" style="display:flex; height:100vh; align-items:center; justify-content:center;">
    <div class="box" style="width:300px; text-align:center;">
        <h2 style="color:var(--red)">PlayFlix</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="autenticar()" style="width:100%">LOGAR</button>
    </div>
</div>

<div id="scr-adm" class="container hidden">
    <div class="box">
        <h3>Servidor (URL da Lista)</h3>
        <input type="text" id="m3u-url" placeholder="Cole a URL do servidor aqui...">
        <button onclick="salvarConfig()" style="background:#27ae60">SALVAR CONFIGURAÇÃO</button>
    </div>

    <div class="box">
        <h3>Gerenciar Clientes</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px">
            <input type="text" id="nu" placeholder="Login">
            <input type="text" id="np" placeholder="Senha">
            <input type="number" id="nd" placeholder="Dias">
        </div>
        <button onclick="addUser()" style="margin-top:10px">CRIAR NOVO ACESSO</button>
        <table>
            <thead><tr><th>Usuário</th><th>Vencimento</th><th>Ações</th></tr></thead>
            <tbody id="lista-users"></tbody>
        </table>
    </div>
    <button onclick="location.reload()" style="background:#444">SAIR DO PAINEL</button>
</div>

<div id="scr-user" class="hidden">
    <div style="padding: 15px; display:flex; justify-content:space-between; align-items:center; background: #000; position: sticky; top:0; z-index:100;">
        <h2 style="color:var(--red); margin:0;">PlayFlix</h2>
        <button onclick="location.reload()" style="background:#333">SAIR</button>
    </div>
    <div id="loading" style="text-align:center; padding:50px;" class="hidden">Carregando catálogo...</div>
    <div id="catalogo" class="container" style="max-width:100%"></div>
</div>

<div id="player-modal">
    <button class="close-p" onclick="fecharPlayer()">X</button>
    <video id="vid" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<script>
// Configuração Firebase (Sua imagem 1000161270.png)
const firebaseConfig = {
    apiKey: "AIzaSyCfl6Gwpult8zt456YtKyiaInDYQuEHFry",
    authDomain: "meuscanais-f21c1.firebaseapp.com",
    projectId: "meuscanais-f21c1",
    storageBucket: "meuscanais-f21c1.appspot.com",
    messagingSenderId: "103509336122",
    appId: "1:103509336122:web:5485d876b2f8eb6c2d503"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function autenticar() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    if(u === "Rhuan" && p === "270412") {
        abrir('scr-adm');
        carregarPainelAdm();
    } else {
        const doc = await db.collection("usuarios").doc(u).get();
        if(doc.exists && doc.data().senha === p) {
            if(Date.now() > doc.data().expira) return alert("Acesso vencido!");
            abrir('scr-user');
            buscarEShow();
        } else { alert("Login incorreto!"); }
    }
}

function abrir(id) {
    document.getElementById('scr-login').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

// ADM
async function salvarConfig() {
    const url = document.getElementById('m3u-url').value;
    await db.collection("config").doc("geral").set({ urlM3U: url });
    alert("URL do Servidor Atualizada!");
}

async function carregarPainelAdm() {
    const doc = await db.collection("config").doc("geral").get();
    if(doc.exists) document.getElementById('m3u-url').value = doc.data().urlM3U;

    db.collection("usuarios").onSnapshot(snap => {
        const tb = document.getElementById('lista-users');
        tb.innerHTML = "";
        snap.forEach(u => {
            const dias = Math.ceil((u.data().expira - Date.now()) / (1000*60*60*24));
            tb.innerHTML += `<tr><td>${u.id}</td><td>${dias} dias</td><td><button onclick="removerU('${u.id}')" style="background:#333; padding:5px">X</button></td></tr>`;
        });
    });
}

async function addUser() {
    const u = document.getElementById('nu').value;
    const p = document.getElementById('np').value;
    const d = parseInt(document.getElementById('nd').value);
    const exp = Date.now() + (d * 24 * 60 * 60 * 1000);
    await db.collection("usuarios").doc(u).set({ senha: p, expira: exp, status: "ativo" });
    alert("Usuário Criado!");
}

async function removerU(id) { if(confirm("Remover?")) await db.collection("usuarios").doc(id).delete(); }

// LOGICA DE CARREGAMENTO COM PROXY (Evita tela preta)
async function buscarEShow() {
    document.getElementById('loading').classList.remove('hidden');
    const doc = await db.collection("config").doc("geral").get();
    if(!doc.exists || !doc.data().urlM3U) return alert("URL não configurada!");

    const urlOriginal = doc.data().urlM3U;
    const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(urlOriginal);

    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const text = data.contents;
        
        const categorias = {};
        const blocos = text.split('#EXTINF:');
        blocos.shift();

        blocos.forEach(bloco => {
            if(bloco.includes('http')) {
                const lines = bloco.split('\n');
                const info = lines[0];
                const videoUrl = lines.find(l => l.trim().startsWith('http'))?.trim();
                const grupo = info.match(/group-title="(.*?)"/)?.[1] || "Diversos";
                const nome = info.split(',')[1]?.trim() || "Conteúdo";
                const logo = info.match(/tvg-logo="(.*?)"/)?.[1] || "";

                if(!categorias[grupo]) categorias[grupo] = [];
                categorias[grupo].push({ nome, url: videoUrl, logo });
            }
        });

        renderizar(categorias);
    } catch (e) { alert("Erro ao carregar lista do servidor."); }
    document.getElementById('loading').classList.add('hidden');
}

function renderizar(categorias) {
    const display = document.getElementById('catalogo');
    display.innerHTML = "";
    for(let cat in categorias) {
        const section = document.createElement('div');
        section.innerHTML = `<div class="category-title">${cat}</div><div class="movie-grid"></div>`;
        const grid = section.querySelector('.movie-grid');
        categorias[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'movie-item';
            div.innerHTML = `<img src="${item.logo}" onerror="this.src='https://via.placeholder.com/200x300?text=PlayFlix'"><div class="movie-name">${item.nome}</div>`;
            div.onclick = () => play(item.url);
            grid.appendChild(div);
        });
        display.appendChild(section);
    }
}

function play(url) {
    const video = document.getElementById('vid');
    document.getElementById('player-modal').style.display = 'block';
    let finalUrl = url.includes('output=mpegts') ? url.replace('output=mpegts', 'output=m3u8') : url;

    if(Hls.isSupported()) {
        const hls = new Hls({ xhrSetup: xhr => xhr.withCredentials = false });
        hls.loadSource(finalUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else { video.src = finalUrl; video.play(); }
}

function fecharPlayer() {
    const v = document.getElementById('vid');
    v.pause(); v.src = "";
    document.getElementById('player-modal').style.display = 'none';
}
</script>
</body>
</html>
