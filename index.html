<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayFlix VIP - Versão Final</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .hidden { display: none !important; }
        .box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Grid Netflix */
        .category-title { margin-top: 30px; color: #fff; font-size: 1.2rem; border-left: 4px solid var(--red); padding-left: 10px; font-weight: bold; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 15px; }
        .movie-item { transition: 0.3s; cursor: pointer; background: #1a1a1a; border-radius: 5px; overflow: hidden; border: 1px solid #222; }
        .movie-item:hover { transform: scale(1.05); border-color: var(--red); }
        .movie-item img { width: 100%; height: 190px; object-fit: cover; background: #000; }
        .movie-name { padding: 8px; font-size: 11px; text-align: center; height: 35px; display: flex; align-items: center; justify-content: center; }

        /* Player */
        #player-modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        video { width: 100%; height: 100%; }
        .close-p { position: absolute; top: 20px; right: 20px; background: var(--red); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; z-index: 10001; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="scr-login" style="display:flex; height:100vh; align-items:center; justify-content:center;">
    <div class="box" style="width:300px; text-align:center;">
        <h2 style="color:var(--red)">PlayFlix</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="autenticar()" style="width:100%">LOGAR</button>
    </div>
</div>

<div id="scr-adm" class="container hidden">
    <div class="box">
        <h3>Servidor (Link RAW do GitHub)</h3>
        <input type="text" id="m3u-url" placeholder="https://raw.githubusercontent.com/...">
        <button onclick="salvarConfig()" style="background:#27ae60">SALVAR URL</button>
    </div>
    <div class="box">
        <h3>Gerenciar Usuários</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px">
            <input type="text" id="nu" placeholder="Login">
            <input type="text" id="np" placeholder="Senha">
            <input type="number" id="nd" placeholder="Dias">
        </div>
        <button onclick="addUser()" style="margin-top:10px">CRIAR ACESSO</button>
        <div id="lista-users-container" style="margin-top:15px;"></div>
    </div>
    <button onclick="location.reload()" style="background:#444">SAIR</button>
</div>

<div id="scr-user" class="hidden">
    <div style="padding: 15px; background: #000; position: sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--red); margin:0;">PlayFlix</h2>
        <button onclick="location.reload()" style="background:#333">SAIR</button>
    </div>
    <div id="loading" style="text-align:center; padding:50px;" class="hidden">Carregando conteúdos...</div>
    <div id="catalogo" class="container" style="max-width:100%"></div>
</div>

<div id="player-modal">
    <button class="close-p" onclick="fecharPlayer()">X</button>
    <video id="vid" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<script>
// Configuração Firebase (Sua configuração original)
const firebaseConfig = {
    apiKey: "AIzaSyCfl6Gwpult8zt456YtKyiaInDYQuEHFry",
    authDomain: "meuscanais-f21c1.firebaseapp.com",
    projectId: "meuscanais-f21c1",
    storageBucket: "meuscanais-f21c1.appspot.com",
    messagingSenderId: "103509336122",
    appId: "1:103509336122:web:5485d876b2f8eb6c2d503"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function autenticar() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    if(u === "Rhuan" && p === "270412") { abrir('scr-adm'); carregarPainelAdm(); }
    else {
        const doc = await db.collection("usuarios").doc(u).get();
        if(doc.exists && doc.data().senha === p) {
            if(Date.now() > doc.data().expira) return alert("Acesso vencido!");
            abrir('scr-user'); buscarEShow();
        } else { alert("Login incorreto!"); }
    }
}

function abrir(id) {
    document.getElementById('scr-login').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

// ADM
async function salvarConfig() {
    const url = document.getElementById('m3u-url').value;
    if(!url.includes('http')) return alert("Insira uma URL válida!");
    await db.collection("config").doc("geral").set({ urlM3U: url });
    alert("URL Salva!");
}

async function carregarPainelAdm() {
    const doc = await db.collection("config").doc("geral").get();
    if(doc.exists) document.getElementById('m3u-url').value = doc.data().urlM3U;
    db.collection("usuarios").onSnapshot(snap => {
        let html = '<table>';
        snap.forEach(u => {
            html += `<tr><td>${u.id}</td><td><button onclick="removerU('${u.id}')">Excluir</button></td></tr>`;
        });
        document.getElementById('lista-users-container').innerHTML = html + '</table>';
    });
}

async function addUser() {
    const u = document.getElementById('nu').value, p = document.getElementById('np').value, d = parseInt(document.getElementById('nd').value);
    const exp = Date.now() + (d * 86400000);
    await db.collection("usuarios").doc(u).set({ senha: p, expira: exp });
    alert("Usuário Criado!");
}

async function removerU(id) { if(confirm("Remover?")) await db.collection("usuarios").doc(id).delete(); }

// BUSCA COM PROXY (Resolve o problema de girar e não carregar)
async function buscarEShow() {
    document.getElementById('loading').classList.remove('hidden');
    const doc = await db.collection("config").doc("geral").get();
    if(!doc.exists) return;

    // Proxy para burlar bloqueios de navegador
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(doc.data().urlM3U)}`;

    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const text = data.contents;
        
        const categorias = {};
        const blocos = text.split('#EXTINF:');
        blocos.shift();

        blocos.forEach(bloco => {
            if(bloco.includes('http')) {
                const linhas = bloco.split('\n');
                const info = linhas[0];
                const videoUrl = linhas.find(l => l.trim().startsWith('http'))?.trim();
                const grupo = info.match(/group-title="(.*?)"/)?.[1] || "Geral";
                const nome = info.split(',')[1]?.trim() || "Conteúdo";
                const logo = info.match(/tvg-logo="(.*?)"/)?.[1] || "";

                if(!categorias[grupo]) categorias[grupo] = [];
                categorias[grupo].push({ nome, url: videoUrl, logo });
            }
        });
        renderizar(categorias);
    } catch (e) { alert("Erro ao carregar lista."); }
    document.getElementById('loading').classList.add('hidden');
}

function renderizar(categorias) {
    const display = document.getElementById('catalogo');
    display.innerHTML = "";
    for(let cat in categorias) {
        const section = document.createElement('div');
        section.innerHTML = `<div class="category-title">${cat}</div><div class="movie-grid"></div>`;
        const grid = section.querySelector('.movie-grid');
        categorias[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'movie-item';
            div.innerHTML = `<img src="${item.logo}" onerror="this.src='https://via.placeholder.com/200x300?text=Sem+Capa'"><div class="movie-name">${item.nome}</div>`;
            div.onclick = () => play(item.url);
            grid.appendChild(div);
        });
        display.appendChild(section);
    }
}

// PLAYER TURBO (DRIVE + IPTV)
function play(url) {
    const video = document.getElementById('vid');
    document.getElementById('player-modal').style.display = 'block';
    
    let cleanUrl = url.trim();

    // Ajuste Automático para Google Drive
    if(cleanUrl.includes('drive.google.com')){
       cleanUrl = cleanUrl.replace('/view?usp=drivesdk', '').replace('file/d/', 'uc?id=') + '&export=media';
    }

    // Se for arquivo direto (MP4/Drive)
    if(cleanUrl.includes('.mp4') || cleanUrl.includes('google.com')) {
        video.src = cleanUrl;
        video.play().catch(() => {
            // Se falhar, tenta forçar via HLS apenas por desencargo
            tentarHLS(cleanUrl, video);
        });
    } else {
        tentarHLS(cleanUrl, video);
    }
}

function tentarHLS(url, video) {
    if (Hls.isSupported()) {
        const hls = new Hls({ xhrSetup: xhr => xhr.withCredentials = false });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
        video.src = url;
        video.play();
    }
}

function fecharPlayer() {
    const v = document.getElementById('vid');
    v.pause(); v.src = "";
    document.getElementById('player-modal').style.display = 'none';
}
</script>
</body>
</html>
