<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream VOD - Player Manual</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e50914; --bg: #050505; --surface: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        /* Tela Inicial */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
            padding: 20px; text-align: center;
        }
        .input-area { width: 100%; max-width: 400px; background: var(--surface); padding: 30px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        
        /* App Interface */
        header { display: none; padding: 20px; background: linear-gradient(black, transparent); position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .nav-item { cursor: pointer; opacity: 0.6; font-weight: bold; }
        .nav-item.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        .pills { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .pill { background: #222; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 12px; cursor: pointer; }
        .pill.active { background: white; color: black; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .card { background: var(--surface); border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; width: 100%; padding: 5px; background: rgba(0,0,0,0.7); font-size: 10px; text-align: center; }

        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        video { width: 100%; height: 80vh; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="input-area">
            <h2 style="color:var(--primary)">CLONEFLIX</h2>
            <p>Insira sua URL M3U para carregar</p>
            <input type="text" id="m3u-url" placeholder="http://servidor.com/get.php?..." value="http://bufalov6.shop/get.php?username=21467491&password=79853258&type=m3u_plus&output=mpegts">
            <button onclick="carregarLista()" id="btn-sync" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SINCRONIZAR CONTEÚDO</button>
        </div>
    </div>

    <header id="app-header">
        <div class="nav">
            <div id="tab-filmes" class="nav-item active" onclick="mudarModo('filmes')">FILMES</div>
            <div id="tab-series" class="nav-item" onclick="mudarModo('series')">SÉRIES</div>
        </div>
        <div id="pills-box" class="pills"></div>
    </header>

    <div id="grid-container" class="grid"></div>

    <div id="player-view">
        <video id="main-video" controls autoplay></video>
        <button onclick="fecharPlayer()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none;">VOLTAR PARA LISTA</button>
    </div>

    <script>
        const PROXY = "https://api.allorigins.win/raw?url=";
        let catalogo = { filmes: {}, series: {} };
        let modoAtivo = 'filmes';
        let shakaPlayer = null;

        async function carregarLista() {
            const url = document.getElementById('m3u-url').value;
            const btn = document.getElementById('btn-sync');
            if(!url) return alert("Insira um link!");

            btn.innerText = "Sincronizando...";
            try {
                const res = await fetch(PROXY + encodeURIComponent(url));
                const data = await res.text();
                
                parsearM3U(data);
                
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('app-header').style.display = 'block';
                mudarModo('filmes');
            } catch (e) {
                alert("Erro ao conectar. Tente novamente.");
                btn.innerText = "SINCRONIZAR CONTEÚDO";
            }
        }

        function parsearM3U(data) {
            const regex = /#EXTINF:(?:.*?group-title="([^"]*)")?(?:.*?tvg-logo="([^"]*)")?[^,]*,(.*)\n(http[^\n\r]*)/g;
            let m;
            while ((m = regex.exec(data)) !== null) {
                const [_, grupo, logo, nome, link] = m;
                const gNome = grupo || "Geral";
                const lowerG = gNome.toLowerCase();

                if (lowerG.includes('serie')) {
                    let base = nome.split(/S\d+|T\d+|EP/i)[0].trim();
                    if (!catalogo.series[gNome]) catalogo.series[gNome] = {};
                    if (!catalogo.series[gNome][base]) catalogo.series[gNome][base] = { n: base, l: logo, eps: [] };
                    catalogo.series[gNome][base].eps.push({ n: nome, u: link });
                } else {
                    if (!catalogo.filmes[gNome]) catalogo.filmes[gNome] = [];
                    catalogo.filmes[gNome].push({ n: nome, l: logo, u: link });
                }
            }
        }

        function mudarModo(m) {
            modoAtivo = m;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${m}`).classList.add('active');
            
            const pBox = document.getElementById('pills-box');
            pBox.innerHTML = "";
            const grupos = Object.keys(catalogo[m]);

            grupos.forEach((g, idx) => {
                const p = document.createElement('div');
                p.className = `pill ${idx === 0 ? 'active' : ''}`;
                p.innerText = g;
                p.onclick = () => {
                    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
                    p.classList.add('active');
                    renderizarGrid(catalogo[m][g]);
                };
                pBox.appendChild(p);
            });
            if(grupos.length > 0) renderizarGrid(catalogo[m][grupos[0]]);
        }

        function renderizarGrid(itens) {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = "";
            const lista = modoAtivo === 'series' ? Object.values(itens) : itens;

            lista.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${item.l || 'https://via.placeholder.com/200x300'}" onerror="this.src='https://via.placeholder.com/200x300?text=S+Capa'">
                    <div class="card-title">${item.n}</div>
                `;
                div.onclick = () => iniciarPlay(item.u || item.eps[0].u);
                grid.appendChild(div);
            });
        }

        async function iniciarPlay(url) {
            document.getElementById('player-view').style.display = 'block';
            const v = document.getElementById('main-video');
            if (shakaPlayer) await shakaPlayer.destroy();
            shakaPlayer = new shaka.Player(v);
            try { await shakaPlayer.load(url); } catch (e) { v.src = url; }
        }

        function fecharPlayer() {
            const v = document.getElementById('main-video');
            v.pause(); v.src = "";
            document.getElementById('player-view').style.display = 'none';
        }

        shaka.polyfill.installAll();
    </script>
</body>
</html>
