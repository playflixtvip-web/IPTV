<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream VOD - Netflix Style</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --netflix-red: #e50914;
            --bg-dark: #141414;
            --card-bg: #2f2f2f;
            --text-main: #ffffff;
            --text-gray: #b3b3b3;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Header & Nav --- */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
            padding: 20px 4%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            transition: background 0.3s;
        }

        .logo {
            color: var(--netflix-red);
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: 30px;
        }

        .nav-link {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-gray);
            transition: 0.3s;
        }

        .nav-link.active {
            color: #fff;
            font-weight: bold;
        }

        /* --- Hero/Search Section --- */
        .hero {
            padding-top: 100px;
            padding-left: 4%;
            margin-bottom: 20px;
        }

        .search-bar {
            background: rgba(0,0,0,0.5);
            border: 1px solid #fff;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            width: 250px;
            outline: none;
        }

        /* --- Categories (Pills) --- */
        .categories-container {
            padding: 0 4%;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .categories-container::-webkit-scrollbar { display: none; }

        .category-pill {
            background: rgba(255,255,255,0.1);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .category-pill.active {
            background: #fff;
            color: #000;
        }

        /* --- Content Grid --- */
        .content-section {
            padding: 0 4% 40px 4%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .card {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            aspect-ratio: 2/3;
        }

        .card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            width: 100%;
            padding: 10px;
            font-size: 11px;
            box-sizing: border-box;
        }

        /* --- Player Overlay --- */
        #player-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
        }

        video { width: 100%; height: 100vh; }

        .close-vid {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10001;
        }

        /* --- Modal Séries --- */
        #series-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 8000;
            padding: 50px 4%;
            overflow-y: auto;
        }

        .ep-item {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .ep-item:hover { background: #222; }

        /* --- Login/Loading Screen --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo" style="font-size: 48px; margin-bottom: 20px;">STREAM VOD</div>
        <button onclick="fetchM3U()" style="padding: 15px 40px; background: var(--netflix-red); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px;">CONECTAR LISTA</button>
        <p style="margin-top: 20px; color: var(--text-gray); font-size: 12px;">Usuário: 91216526</p>
    </div>

    <header id="main-header" style="display: none;">
        <div style="display: flex; align-items: center;">
            <div class="logo">VOD PRO</div>
            <div class="nav-links">
                <span class="nav-link active" onclick="switchMode('filmes', this)">Filmes</span>
                <span class="nav-link" onclick="switchMode('series', this)">Séries</span>
            </div>
        </div>
        <input type="text" class="search-bar" placeholder="Títulos..." oninput="search(this.value)">
    </header>

    <div id="main-content" style="display: none;">
        <div class="hero">
            <h2 id="current-category-name">Filmes Recentes</h2>
            <div id="pills-box" class="categories-container"></div>
        </div>

        <div class="content-section">
            <div id="main-grid" class="grid"></div>
        </div>
    </div>

    <div id="series-modal">
        <button onclick="document.getElementById('series-modal').style.display='none'" style="float: right; color: white; background: none; border: 1px solid white; padding: 10px;">FECHAR</button>
        <h1 id="modal-show-title" style="color: var(--netflix-red);"></h1>
        <div id="episodes-list"></div>
    </div>

    <div id="player-overlay">
        <div class="close-vid" onclick="closePlayer()">← VOLTAR</div>
        <video id="video-player" controls autoplay></video>
    </div>

    <script>
        let rawData = { filmes: {}, series: {} };
        let currentType = 'filmes';
        let shakaPlayer = null;

        // DADOS DE ACESSO (MANTIDOS)
        const M3U_URL = "http://bufalov6.shop/get.php?username=21467491&password=79853258&type=m3u_plus&output=mpegts";

        async function fetchM3U() {
            const btn = document.querySelector('#login-screen button');
            btn.innerText = "Sincronizando Catálogo...";
            
            try {
                const response = await fetch(M3U_URL);
                const text = await response.text();
                parseM3U(text);
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('main-content').style.display = 'block';
                
                renderCategories();
            } catch (err) {
                alert("Erro ao carregar lista. Verifique o servidor.");
                btn.innerText = "TENTAR NOVAMENTE";
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentMeta = null;

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    const group = line.match(/group-title="([^"]*)"/)?.[1] || "Geral";
                    const logo = line.match(/tvg-logo="([^"]*)"/)?.[1] || "";
                    const name = line.split(',')[1]?.trim() || "Sem título";
                    currentMeta = { group, logo, name };
                } else if (line.startsWith('http') && currentMeta) {
                    const g = currentMeta.group.toLowerCase();
                    const isSerie = g.includes('serie') || g.includes('episódio');

                    if (isSerie) {
                        // Lógica de Agrupamento de Séries (9xtream style)
                        let baseName = currentMeta.name.split(/S\d+|T\d+|TEMP|EP/i)[0].trim();
                        if (!rawData.series[currentMeta.group]) rawData.series[currentMeta.group] = {};
                        if (!rawData.series[currentMeta.group][baseName]) {
                            rawData.series[currentMeta.group][baseName] = { name: baseName, logo: currentMeta.logo, episodes: [] };
                        }
                        rawData.series[currentMeta.group][baseName].episodes.push({ title: currentMeta.name, url: line.trim() });
                    } else {
                        // Lógica de Filmes
                        if (!rawData.filmes[currentMeta.group]) rawData.filmes[currentMeta.group] = [];
                        rawData.filmes[currentMeta.group].push({ name: currentMeta.name, logo: currentMeta.logo, url: line.trim() });
                    }
                    currentMeta = null;
                }
            });
        }

        function renderCategories() {
            const container = document.getElementById('pills-box');
            container.innerHTML = "";
            const categories = Object.keys(rawData[currentType]);

            categories.forEach((cat, index) => {
                const pill = document.createElement('div');
                pill.className = `category-pill ${index === 0 ? 'active' : ''}`;
                pill.innerText = cat;
                pill.onclick = () => {
                    document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    renderGrid(cat);
                };
                container.appendChild(pill);
            });

            if (categories.length > 0) renderGrid(categories[0]);
        }

        function renderGrid(categoryName) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            const items = currentType === 'filmes' ? rawData.filmes[categoryName] : Object.values(rawData.series[categoryName]);

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                const img = item.logo || 'https://via.placeholder.com/300x450/111/333?text=Sem+Poster';
                
                div.innerHTML = `
                    <img src="${img}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/111/333?text=${encodeURIComponent(item.name)}'">
                    <div class="card-info">
                        <b>${item.name}</b>
                        ${item.episodes ? `<div style="color:var(--netflix-red)">${item.episodes.length} Eps</div>` : ''}
                    </div>
                `;
                
                div.onclick = () => {
                    if (currentType === 'series') openSeries(item);
                    else startPlayer(item.url);
                };
                grid.appendChild(div);
            });
            document.getElementById('current-category-name').innerText = categoryName;
        }

        function switchMode(type, el) {
            currentType = type;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            renderCategories();
        }

        function openSeries(serie) {
            const modal = document.getElementById('series-modal');
            const list = document.getElementById('episodes-list');
            document.getElementById('modal-show-title').innerText = serie.name;
            list.innerHTML = "";
            
            serie.episodes.forEach(ep => {
                const d = document.createElement('div');
                d.className = 'ep-item';
                d.innerHTML = `<span>${ep.title}</span> <b>PLAY</b>`;
                d.onclick = () => { modal.style.display='none'; startPlayer(ep.url); };
                list.appendChild(d);
            });
            modal.style.display = 'block';
        }

        async function startPlayer(url) {
            const overlay = document.getElementById('player-overlay');
            const video = document.getElementById('video-player');
            overlay.style.display = 'block';

            if (shaka.Player.isBrowserSupported()) {
                if (shakaPlayer) await shakaPlayer.destroy();
                shakaPlayer = new shaka.Player(video);
                try {
                    await shakaPlayer.load(url);
                } catch (e) {
                    video.src = url; // Fallback
                }
            } else {
                video.src = url;
            }
        }

        function closePlayer() {
            const video = document.getElementById('video-player');
            video.pause();
            video.src = "";
            document.getElementById('player-overlay').style.display = 'none';
        }

        function search(term) {
            const t = term.toLowerCase();
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            
            // Busca em todas as categorias do modo atual
            Object.values(rawData[currentType]).forEach(group => {
                const list = currentType === 'series' ? Object.values(group) : group;
                list.forEach(item => {
                    if (item.name.toLowerCase().includes(t)) {
                        // Renderiza card simplificado na busca
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = `<img src="${item.logo}"><div class="card-info"><b>${item.name}</b></div>`;
                        div.onclick = () => currentType === 'series' ? openSeries(item) : startPlayer(item.url);
                        grid.appendChild(div);
                    }
                });
            });
        }

        shaka.polyfill.installAll();
    </script>
</body>
</html>
