<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream VOD - BYPASS MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .setup-container { padding: 40px 20px; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; }
        .btn { padding: 15px 30px; background: #e50914; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 90%; }
        #player-box { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; }
        video { width: 100%; height: 80%; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: #111; border-radius: 5px; font-size: 10px; padding: 5px; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
    </style>
</head>
<body>

<div id="setup" class="setup-container">
    <h2>BYPASS LOADER</h2>
    <p style="font-size: 12px; color: #888;">Se o link falhar, mude o tipo de saída para <b>&output=ts</b></p>
    <input type="text" id="m3u" placeholder="Cole seu link M3U aqui..." value="http://bufalov6.shop/get.php?username=17127281&password=SUA_SENHA&type=m3u_plus&output=ts">
    <button class="btn" onclick="forcarCarga()">FORÇAR ENTRADA (MÉTODO 4)</button>
    <div id="log" style="font-size: 10px; color: yellow; margin-top: 10px;"></div>
</div>

<div id="content" style="display:none;">
    <div id="grid-vod" class="grid"></div>
</div>

<div id="player-box">
    <video id="vid" controls></video>
    <button class="btn" onclick="fechar()">FECHAR CANAL</button>
</div>

<script>
    // Lista de Proxies de reserva caso o servidor mude o bloqueio
    const gatekeeper = "https://worker-bold-morning-8a5b.playflix-cors.workers.dev/?u=";

    async function forcarCarga() {
        const url = document.getElementById('m3u').value;
        const log = document.getElementById('log');
        log.innerText = "Iniciando quebra de handshake...";

        try {
            // Tentativa via Cloudflare Worker (Bypass mais forte que AllOrigins)
            const response = await fetch(gatekeeper + btoa(url));
            const text = await response.text();

            if (text.length < 100) throw new Error("Resposta muito curta");

            processar(text);
            document.getElementById('setup').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            log.innerText = "Conectado!";
        } catch (e) {
            log.innerText = "Servidor recusou. Tente abrir o link da lista direto no Chrome antes de usar o APK para 'autorizar' seu IP.";
            console.error(e);
        }
    }

    function processar(data) {
        const grid = document.getElementById('grid-vod');
        const linhas = data.split('#EXTINF:');
        linhas.forEach(l => {
            if(l.includes('http')) {
                const nome = l.split(',')[1]?.split('\n')[0] || "Canal";
                const link = l.split('\n')[1]?.trim();
                const logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${logo}"><div>${nome.substring(0,20)}</div>`;
                div.onclick = () => play(link);
                grid.appendChild(div);
            }
        });
    }

    function play(url) {
        const p = document.getElementById('player-box');
        const v = document.getElementById('vid');
        p.style.display = 'block';
        if(Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else {
            v.src = url;
            v.play();
        }
    }

    function fechar() {
        document.getElementById('vid').pause();
        document.getElementById('player-box').style.display = 'none';
    }
</script>
</body>
</html>
