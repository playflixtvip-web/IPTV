<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream VOD - Cloneflix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root { --primary: #e50914; --bg: #050505; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        /* Tela de Login para inserir a lista */
        #login { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { background: #121212; padding: 40px; border-radius: 10px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        
        /* Layout do App */
        header { display: none; padding: 20px; position: sticky; top: 0; background: black; z-index: 100; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: #121212; border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        #player { display: none; position: fixed; inset: 0; background: black; z-index: 2000; }
        video { width: 100%; height: 80vh; }
    </style>
</head>
<body>

    <div id="login">
        <div class="box">
            <h1 style="color:var(--primary)">CLONEFLIX</h1>
            <input type="text" id="url-m3u" placeholder="Cole o link da sua lista M3U aqui">
            <button onclick="carregar()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <header id="header">
        <h2 style="color:var(--primary)">MEU VOD</h2>
    </header>

    <div id="grid" class="grid"></div>

    <div id="player">
        <video id="video" controls autoplay></video>
        <button onclick="fechar()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none;">VOLTAR</button>
    </div>

    <script>
        // Proxy para evitar o erro de conexão (CORS) no GitHub Pages
        const PROXY = "https://api.allorigins.win/raw?url=";
        let playerShaka = null;

        async function carregar() {
            const url = document.getElementById('url-m3u').value;
            if(!url) return alert("Insira um link!");

            try {
                const res = await fetch(PROXY + encodeURIComponent(url));
                const data = await res.text();
                
                parse(data);
                
                document.getElementById('login').style.display = 'none';
                document.getElementById('header').style.display = 'block';
            } catch (e) {
                alert("Erro ao carrergar lista. Verifique o link.");
            }
        }

        function parse(data) {
            const grid = document.getElementById('grid');
            const regex = /#EXTINF:.*tvg-logo="([^"]*)".*,(.*)\n(http[^\n\r]*)/g;
            let m;
            while ((m = regex.exec(data)) !== null) {
                const [_, logo, nome, link] = m;
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${logo}" onerror="this.src='https://via.placeholder.com/200x300?text=VOD'">`;
                div.onclick = () => play(link);
                grid.appendChild(div);
            }
        }

        async function play(url) {
            document.getElementById('player').style.display = 'block';
            const v = document.getElementById('video');
            if (playerShaka) await playerShaka.destroy();
            playerShaka = new shaka.Player(v);
            try { await playerShaka.load(url); } catch (e) { v.src = url; }
        }

        function fechar() {
            const v = document.getElementById('video');
            v.pause(); v.src = "";
            document.getElementById('player').style.display = 'none';
        }
        shaka.polyfill.installAll();
    </script>
</body>
</html>
