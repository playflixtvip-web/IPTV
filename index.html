<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream VOD - MODO OFFLINE/LOCAL</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e50914; --black: #050505; --gray: #1a1a1a; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Área de Colar a Lista */
        #setup-screen { padding: 20px; text-align: center; }
        textarea { 
            width: 100%; height: 200px; background: #111; color: #0f0; 
            border: 1px solid #333; border-radius: 8px; font-family: monospace; font-size: 10px;
            margin-bottom: 15px; padding: 10px; box-sizing: border-box;
        }
        
        .btn-action { 
            background: var(--red); color: white; border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer;
        }

        /* Grid de Conteúdo */
        #main-content { display: none; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; text-align: center; font-size: 11px; }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .card div { padding: 5px; height: 30px; overflow: hidden; }

        /* Player */
        #player-box { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: auto; aspect-ratio: 16/9; }
        .close-btn { background: var(--red); padding: 15px; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="color:var(--red)">INJETOR DE LISTA LOCAL</h2>
    <p style="font-size: 12px; color: #aaa;">Baixe sua lista .m3u, abra como texto, copie tudo e cole abaixo:</p>
    <textarea id="raw-data" placeholder="Cole aqui o conteúdo do seu arquivo M3U..."></textarea>
    <button class="btn-action" onclick="injetarLista()">INJETAR E ABRIR APP</button>
</div>

<div id="main-content">
    <div style="padding: 15px; background: #111; display: flex; gap: 10px;">
        <input type="text" id="search" placeholder="Buscar..." oninput="filtrar()" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:5px;">
        <button onclick="location.reload()" style="background:#444; border:none; color:white; padding:10px; border-radius:5px;">Sair</button>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div id="player-box">
    <video id="video-player" controls autoplay></video>
    <div class="close-btn" onclick="fecharPlayer()">FECHAR PLAYER X</div>
</div>

<script>
    let bancoDados = [];

    function injetarLista() {
        const raw = document.getElementById('raw-data').value;
        if (!raw.includes('#EXTM3U')) return alert("Isso não parece uma lista M3U válida!");

        bancoDados = [];
        const blocos = raw.split('#EXTINF:');
        
        blocos.forEach(bloco => {
            if (bloco.includes('http')) {
                const linhas = bloco.split('\n');
                const info = linhas[0];
                const link = linhas.find(l => l.trim().startsWith('http'))?.trim();
                const nome = info.split(',')[1]?.trim() || "Sem Nome";
                const logo = info.match(/tvg-logo="(.*?)"/)?.[1] || "";

                if (link) {
                    bancoDados.push({ n: nome, l: logo, u: link });
                }
            }
        });

        if (bancoDados.length > 0) {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderizar(bancoDados);
        } else {
            alert("Nenhum link encontrado na lista colada.");
        }
    }

    function renderizar(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        lista.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${item.l}" onerror="this.src='https://via.placeholder.com/150x200?text=VOD'">
                <div>${item.n.substring(0, 30)}</div>
            `;
            div.onclick = () => play(item.u);
            grid.appendChild(div);
        });
    }

    function play(url) {
        const box = document.getElementById('player-box');
        const v = document.getElementById('video-player');
        box.style.display = 'block';
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
        } else {
            v.src = url;
        }
    }

    function fecharPlayer() {
        const v = document.getElementById('video-player');
        v.pause();
        v.src = "";
        document.getElementById('player-box').style.display = 'none';
    }

    function filtrar() {
        const termo = document.getElementById('search').value.toLowerCase();
        const filtrados = bancoDados.filter(i => i.n.toLowerCase().includes(termo));
        renderizar(filtrados);
    }
</script>
</body>
</html>
