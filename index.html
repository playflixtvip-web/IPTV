<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>PlayFlix VIP Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    
    <style>
        :root { --primary: #00ed51; --bg: #000; --card: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; }
        #player-box { width: 100%; display: none; position: sticky; top: 0; z-index: 999; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .header { padding: 15px; background: #111; }
        .btn-sync { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #1a1a1a; }
        .card .title { font-size: 10px; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="player-box">
        <video id="video" controls autoplay playsinline></video>
        <button onclick="stopPlayer()" style="width:100%; padding:10px; background:red; color:white; border:none;">FECHAR PLAYER X</button>
    </div>

    <div class="header">
        <button class="btn-sync" id="syncBtn" onclick="fetchM3U()">SINCRONIZAR LISTA</button>
        <input type="text" id="searchInput" placeholder="Buscar..." style="width:100%; margin-top:10px; padding:10px; border-radius:5px;" oninput="filtrar()">
    </div>

    <div id="grid" class="grid"></div>

    <script>
        let dataStore = [];
        let shakaInstance = null;
        const PROXY = "https://corsproxy.io/?"; 
        const M3U_URL = "http://bufalov1.fun/get.php?username=91216526&password=41118947&type=m3u_plus&output=mpegts";

        shaka.polyfill.installAll();

        async function fetchM3U() {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "Carregando...";
            try {
                const response = await fetch(PROXY + encodeURIComponent(M3U_URL));
                const text = await response.text();
                
                const regex = /#EXTINF:.*tvg-logo="([^"]*)".*,(.*)\n(http.*)/g;
                let m;
                dataStore = [];

                while ((m = regex.exec(text)) !== null) {
                    dataStore.push({ l: m[1], n: m[2], u: m[3] });
                }
                renderGrid(dataStore);
                btn.style.display = 'none';
            } catch (e) {
                alert("Erro de conexão. O servidor de lista pode estar offline.");
                btn.innerText = "SINCRONIZAR LISTA";
            }
        }

        function renderGrid(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.l}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/300x450/111/333?text=Erro+Capa'">
                    <div class="title">${item.n}</div>
                `;
                card.onclick = () => playStream(item.u);
                grid.appendChild(card);
            });
        }

        async function playStream(url) {
            const v = document.getElementById('video');
            document.getElementById('player-box').style.display = 'block';
            if (shakaInstance) await shakaInstance.destroy();
            shakaInstance = new shaka.Player(v);
            try { 
                await shakaInstance.load(url); 
            } catch (e) { 
                v.src = url; // Fallback para .ts nativo
            }
            window.scrollTo(0,0);
        }

        function stopPlayer() {
            document.getElementById('video').pause();
            document.getElementById('player-box').style.display = 'none';
        }

        function filtrar() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = dataStore.filter(f => f.n.toLowerCase().includes(termo));
            renderGrid(filtrados);
        }
    </script>
</body>
</html>
