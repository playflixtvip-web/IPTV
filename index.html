<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Gerenciador Streaming</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        :root { --red: #e50914; --dark: #0a0a0a; --card: #141414; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Telas */
        .screen { display: none; padding: 20px; }
        .active { display: block; }

        /* Login */
        .login-box { max-width: 350px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: none; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Dashboard */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: 1px solid #444; width: auto; padding: 8px 20px; font-size: 14px; }
        .tab-btn.active-tab { background: var(--red); border-color: var(--red); }

        /* Tabelas/Lista */
        .user-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .status-ativo { border-left-color: #2ecc71; }
        .status-suspenso { border-left-color: #e74c3c; }
        .actions { display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 11px; width: auto; }
        textarea { width: 100%; height: 200px; background: #111; color: #0f0; border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2 style="color:var(--red)">ADM LOGIN</h2>
            <input type="text" id="admUser" placeholder="Usuário">
            <input type="password" id="admPass" placeholder="Senha">
            <button onclick="checkLogin()">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2>Gerenciador Pro</h2>
            <button class="btn-sm" onclick="location.reload()" style="background:#444">SAIR</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active-tab" onclick="switchAdmin('tab-lista')">LISTA M3U</button>
            <button class="tab-btn" onclick="switchAdmin('tab-users')">USUÁRIOS</button>
        </div>

        <div id="tab-lista" class="admin-tab">
            <h3>Editor da Lista Principal</h3>
            <textarea id="m3uContent" placeholder="Cole o conteúdo da lista aqui..."></textarea>
            <button onclick="saveM3U()">SALVAR E ATUALIZAR LISTA</button>
        </div>

        <div id="tab-users" class="admin-tab" style="display:none">
            <div style="background:#222; padding:15px; border-radius:8px; margin-bottom:20px;">
                <h4>Novo Usuário</h4>
                <input type="text" id="newUserName" placeholder="Nome do Cliente" style="width:48%">
                <input type="number" id="newUserDays" placeholder="Dias de Acesso" style="width:48%">
                <button onclick="addUser()" style="background:#27ae60">CADASTRAR CLIENTE</button>
            </div>
            <div id="userList">
                </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE (Substitua pelos seus dados do console Firebase)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Login Fixo solicitado
        function checkLogin() {
            const user = document.getElementById('admUser').value;
            const pass = document.getElementById('admPass').value;
            
            if(user === "Rhuan" && pass === "270412") {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('admin-panel').classList.add('active');
                loadData();
            } else {
                alert("Acesso negado!");
            }
        }

        function switchAdmin(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            event.target.classList.add('active-tab');
        }

        // --- FUNÇÕES DA LISTA ---
        async function saveM3U() {
            const content = document.getElementById('m3uContent').value;
            await db.collection("config").doc("mainList").set({ data: content });
            alert("Lista salva no Firebase!");
        }

        async function loadData() {
            // Carregar M3U
            const doc = await db.collection("config").doc("mainList").get();
            if(doc.exists) document.getElementById('m3uContent').value = doc.data().data;
            
            // Carregar Usuários
            loadUsers();
        }

        // --- FUNÇÕES DE USUÁRIOS ---
        async function addUser() {
            const name = document.getElementById('newUserName').value;
            const days = parseInt(document.getElementById('newUserDays').value);
            const vencimento = new Date();
            vencimento.setDate(vencimento.getDate() + days);

            await db.collection("usuarios").add({
                nome: name,
                expira: vencimento.getTime(),
                status: "ativo"
            });
            loadUsers();
        }

        async function loadUsers() {
            const snapshot = await db.collection("usuarios").get();
            const list = document.getElementById('userList');
            list.innerHTML = "";
            
            snapshot.forEach(doc => {
                const u = doc.data();
                const resto = Math.ceil((u.expira - new Date().getTime()) / (1000*60*60*24));
                
                const div = document.createElement('div');
                div.className = `user-card status-${u.status}`;
                div.innerHTML = `
                    <div>
                        <b>${u.nome}</b><br>
                        <small>${resto > 0 ? resto + ' dias restantes' : 'Expirado'}</small>
                    </div>
                    <div class="actions">
                        <button class="btn-sm" onclick="addDays('${doc.id}', 30)" style="background:#2980b9">+30 dias</button>
                        <button class="btn-sm" onclick="toggleStatus('${doc.id}', '${u.status}')" style="background:#f39c12">
                            ${u.status === 'ativo' ? 'Suspender' : 'Ativar'}
                        </button>
                        <button class="btn-sm" onclick="deleteUser('${doc.id}')" style="background:#c0392b">X</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function addDays(id, days) {
            const ref = db.collection("usuarios").doc(id);
            const doc = await ref.get();
            const novaData = new Date(doc.data().expira);
            novaData.setDate(novaData.getDate() + days);
            await ref.update({ expira: novaData.getTime(), status: 'ativo' });
            loadUsers();
        }

        async function toggleStatus(id, current) {
            const newStatus = current === 'ativo' ? 'suspenso' : 'ativo';
            await db.collection("usuarios").doc(id).update({ status: newStatus });
            loadUsers();
        }

        async function deleteUser(id) {
            if(confirm("Excluir usuário?")) {
                await db.collection("usuarios").doc(id).delete();
                loadUsers();
            }
        }
    </script>
</body>
</html>
